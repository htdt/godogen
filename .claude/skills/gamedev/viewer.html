<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column;
         align-items: center; height: 100vh; font-family: monospace; color: #ccc; }
  .tabs { display: flex; gap: 2px; margin-top: 10px; flex-wrap: wrap; justify-content: center; max-width: 95vw; }
  .tab { padding: 6px 14px; cursor: pointer; background: #333; border: 1px solid #555;
         border-bottom: none; border-radius: 6px 6px 0 0; font-size: 13px; white-space: nowrap; }
  .tab.active { background: #555; color: #fff; }
  .tab:hover { background: #444; }
  img { max-width: 95vw; max-height: 75vh; image-rendering: pixelated; margin-top: 4px; }
  .controls { margin-top: 10px; }
  button { font-size: 16px; margin: 0 5px; padding: 5px 15px; cursor: pointer; }
  #info { margin-top: 8px; font-size: 14px; }
</style>
</head>
<body>
<div class="tabs" id="tabs"></div>
<img id="frame">
<div class="controls">
  <button onclick="prev()">&#9664; Prev</button>
  <button id="playBtn" onclick="togglePlay()">&#9654; Play</button>
  <button onclick="next()">Next &#9654;</button>
  <input type="range" id="speed" min="1" max="30" value="10">
  <label for="speed">FPS</label>
</div>
<div id="info"></div>
<script>
let tasks = [], currentTask = null, frames = [], idx = 0, timer = null;

async function discoverTasks() {
  const r = await fetch('./');
  const html = await r.text();
  const doc = new DOMParser().parseFromString(html, 'text/html');
  return [...doc.querySelectorAll('a')]
    .map(a => a.getAttribute('href'))
    .filter(h => h && h.endsWith('/') && h.startsWith('task'))
    .map(h => h.replace(/\/$/, ''))
    .sort();
}

async function loadFrames(task) {
  frames = []; idx = 0;
  for (let i = 0; i < 9999; i++) {
    const name = task + '/frame' + String(i).padStart(8, '0') + '.png';
    try {
      const r = await fetch(name, { method: 'HEAD' });
      if (!r.ok) break;
      frames.push(name);
    } catch { break; }
  }
  show();
}

function show() {
  const img = document.getElementById('frame');
  const info = document.getElementById('info');
  if (!frames.length) { img.removeAttribute('src'); info.textContent = 'No frames'; return; }
  img.src = frames[idx];
  info.textContent = 'Frame ' + (idx + 1) + ' / ' + frames.length;
}

function next() { if (idx < frames.length - 1) { idx++; show(); } }
function prev() { if (idx > 0) { idx--; show(); } }

function stopTimer() {
  if (timer) { clearInterval(timer); timer = null; }
  document.getElementById('playBtn').textContent = '\u25b6 Play';
}

function togglePlay() {
  if (timer) { stopTimer(); return; }
  if (idx >= frames.length - 1) { idx = 0; show(); }
  timer = setInterval(() => {
    if (idx < frames.length - 1) { idx++; show(); }
    else { stopTimer(); idx = 0; show(); }
  }, 1000 / document.getElementById('speed').value);
  document.getElementById('playBtn').textContent = '\u23f8 Pause';
}

function selectTask(task) {
  stopTimer();
  currentTask = task;
  location.hash = task;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.task === task));
  loadFrames(task);
}

function renderTabs() {
  const c = document.getElementById('tabs');
  c.innerHTML = '';
  tasks.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tab'; el.dataset.task = t;
    el.textContent = t.replace(/^task_\d+_/, '').replace(/_/g, ' ');
    el.onclick = () => selectTask(t);
    c.appendChild(el);
  });
}

async function refresh() {
  const found = await discoverTasks();
  if (found.length !== tasks.length || found.some((t, i) => t !== tasks[i])) {
    tasks = found;
    renderTabs();
    // select newly added task if any
    const hash = location.hash.slice(1);
    if (!currentTask || !tasks.includes(currentTask))
      selectTask(tasks.includes(hash) ? hash : tasks[tasks.length - 1]);
    else
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.task === currentTask));
  }
}

(async () => {
  await refresh();
  if (!tasks.length) { document.getElementById('info').textContent = 'No task folders found'; return; }
  const hash = location.hash.slice(1);
  selectTask(tasks.includes(hash) ? hash : tasks[tasks.length - 1]);
  setInterval(refresh, 3000);
})();
</script>
</body>
</html>
